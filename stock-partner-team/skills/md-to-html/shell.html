<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #F7F5F3; --bg-secondary: #FFFFFF; --bg-card: #FFFFFF;
  --bg-elevated: #FAFAF9; --bg-warm: #F5F2EE; --bg-dark: #2D2926;
  --text-primary: #2D2926; --text-secondary: #5C5652;
  --text-muted: #8A8480; --text-light: #A8A29E;
  --accent: #D97706; --accent-light: #FEF3C7; --accent-hover: #B45309;
  --border: #E5E2DE; --border-light: #F0EEEC;
  --red: #DC2626; --green: #059669; --gold: #D97706; --blue: #2563EB;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Serif SC', 'Source Han Serif SC', 'Songti SC', Georgia, serif;
  background: var(--bg-primary); color: var(--text-primary);
  line-height: 1.8; font-size: 16px; -webkit-font-smoothing: antialiased;
}
h1, h2, h3, h4 { font-family: inherit; font-weight: 600; letter-spacing: 0.02em; }
a { color: var(--accent); text-decoration: none; }
a:hover { color: var(--accent-hover); }

.container { max-width: 1100px; margin: 0 auto; padding: 0 48px; }
.prose { max-width: 760px; margin: 0 auto; }
.prose p { font-size: 1.05rem; line-height: 1.9; margin-bottom: 20px; color: var(--text-primary); }
.section-head { max-width: 1100px; display: grid; grid-template-columns: 120px 1fr; gap: 32px; align-items: baseline; margin: 0 auto 48px; padding: 0 48px; }
.section-num { font-size: 0.9rem; color: var(--accent); letter-spacing: 0.15em; border-top: 1px solid var(--accent); padding-top: 8px; }
.section-title { font-size: 2rem; }
.section-lede { color: var(--text-muted); margin-top: 6px; font-size: 1rem; }
section { padding: 72px 0; }

/* ===== Nav ===== */
nav { position: sticky; top: 0; z-index: 100; height: 64px; display: flex; align-items: center; justify-content: space-between; padding: 0 48px; background: rgba(247,245,243,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-light); }
.nav-logo { font-weight: 600; font-size: 1rem; }
.nav-links { display: flex; gap: 28px; }
.nav-links a { color: var(--text-secondary); font-size: 0.95rem; }
.nav-links a:hover { color: var(--accent); }

/* ===== Hero ===== */
.hero { max-width: 1100px; margin: 0 auto; padding: 96px 48px 48px; }
.kicker { color: var(--accent); font-size: 0.9rem; letter-spacing: 0.15em; font-weight: 500; margin-bottom: 24px; }
.hero h1 { font-size: 3rem; line-height: 1.25; margin-bottom: 24px; max-width: 900px; }
.hero-dek { max-width: 760px; font-size: 1.15rem; color: var(--text-secondary); line-height: 1.9; margin-bottom: 40px; }
.host { display: inline-flex; align-items: center; gap: 12px; font-size: 0.95rem; color: var(--text-muted); }
.host img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); }

/* ===== Module 1 · Conclusion Card ===== */
.conclusion-wrap { max-width: 1100px; margin: 0 auto; padding: 0 48px; }
.conclusion-card {
  padding: 40px 48px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-left: 6px solid var(--accent); border-radius: 20px;
  box-shadow: 0 4px 28px rgba(217, 119, 6, 0.06);
}
#conclusion { padding: 0; }
#conclusion .section-head { margin-bottom: 48px; }
.cc-question {
  font-size: 0.85rem; color: var(--text-muted); letter-spacing: 0.05em;
  margin-bottom: 8px; text-transform: uppercase;
}
.cc-question-text {
  font-size: 1.4rem; font-weight: 600; color: var(--text-primary);
  margin-bottom: 28px; padding-bottom: 24px; border-bottom: 1px dashed var(--border);
}
.cc-question-text::before { content: "「"; color: var(--accent); }
.cc-question-text::after { content: "」"; color: var(--accent); }

.cc-snapshot { margin-bottom: 32px; }
.cc-snapshot-label {
  font-size: 0.78rem; color: var(--text-muted); letter-spacing: 0.18em;
  font-weight: 600; margin-bottom: 14px; text-transform: uppercase;
}
.cc-snapshot-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  background: var(--bg-elevated); border: 1px solid var(--border-light);
  border-radius: 12px; overflow: hidden;
}
.cc-snap-cell {
  padding: 16px 20px;
  border-right: 1px solid var(--border-light);
  border-bottom: 1px solid var(--border-light);
  background: var(--bg-elevated);
}
.cc-snap-cell:nth-child(4n) { border-right: none; }
.cc-snap-cell:nth-last-child(-n+4) { border-bottom: none; }
.cc-snap-cell-label {
  font-size: 0.78rem; color: var(--text-muted); letter-spacing: 0.05em;
  margin-bottom: 6px;
}
.cc-snap-cell-value {
  font-size: 1.4rem; font-weight: 600; color: var(--text-primary);
  font-variant-numeric: tabular-nums; line-height: 1.2;
  letter-spacing: 0.01em;
}
.cc-snap-cell-sub {
  font-size: 0.8rem; color: var(--text-muted); margin-top: 4px;
  font-variant-numeric: tabular-nums;
}
.cc-snap-up { color: var(--red); }
.cc-snap-down { color: var(--green); }

.cc-headline-label {
  font-size: 0.8rem; color: var(--accent); letter-spacing: 0.2em;
  font-weight: 600; margin-bottom: 14px; text-transform: uppercase;
}
.cc-headline {
  font-size: 1.15rem; font-weight: 500; color: var(--text-primary);
  letter-spacing: 0.01em; line-height: 1.75;
  margin-bottom: 32px; padding-bottom: 28px;
  border-bottom: 1px solid var(--border);
}
.cc-headline strong { font-weight: 700; color: var(--text-primary); }
.cc-headline em { font-style: normal; font-weight: 700; color: var(--red); }

.cc-actions-intro {
  font-size: 0.95rem; color: var(--text-muted); letter-spacing: 0.02em;
  margin-bottom: 18px;
}
.cc-actions {
  display: flex; flex-direction: column;
  margin-bottom: 28px;
}
.cc-action-row {
  display: grid; grid-template-columns: 180px 1fr;
  gap: 28px; padding: 18px 0; align-items: baseline;
  border-bottom: 1px dashed var(--border-light);
}
.cc-action-row:last-child { border-bottom: none; }
.cc-action-label {
  font-weight: 600; color: var(--accent); font-size: 1rem;
  letter-spacing: 0.04em;
}
.cc-action-detail {
  color: var(--text-primary); font-size: 1rem; line-height: 1.85;
}
.cc-action-detail strong { color: var(--text-primary); font-weight: 600; }

.cc-vote {
  display: flex; gap: 14px; flex-wrap: wrap; align-items: center;
  padding-top: 20px; border-top: 1px dashed var(--border);
}
.cc-vote-label { font-size: 0.85rem; color: var(--text-muted); letter-spacing: 0.05em; }
.cc-vote-tag {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 0.85rem; color: var(--text-secondary);
  padding: 4px 12px; background: var(--bg-elevated); border-radius: 999px;
  border: 1px solid var(--border-light);
}
.cc-vote-tag .dot { width: 8px; height: 8px; border-radius: 50%; }

/* ===== Module 2 · Voice Card ===== */
.voice-stack { max-width: 1100px; margin: 0 auto; padding: 0 48px; display: flex; flex-direction: column; gap: 24px; }
.voice-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 32px 36px; min-width: 0; }
.voice-head { display: flex; align-items: center; gap: 12px; padding-bottom: 16px; margin-bottom: 16px; border-bottom: 1px solid var(--border-light); }
.voice-head img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); }
.voice-name { font-weight: 600; font-size: 1.1rem; flex: 1; }
.voice-card ol, .voice-card ul { padding-left: 20px; }
.voice-card li { margin-bottom: 12px; line-height: 1.8; }
.voice-card strong { color: var(--text-primary); font-weight: 600; }
.voice-card h4 { margin: 20px 0 10px; font-size: 1.05rem; color: var(--text-primary); }
.voice-card p { margin-bottom: 14px; line-height: 1.85; color: var(--text-secondary); }
.voice-card table { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; font-size: 0.95rem; margin: 16px 0; }
.voice-card th, .voice-card td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border-light); }
.voice-card th { color: var(--text-muted); font-weight: 500; background: var(--bg-elevated); font-size: 0.85rem; }
.voice-card .table-scroll { overflow-x: auto; margin: 16px 0; }
.voice-card .pull-quote { border-left: 3px solid var(--accent); padding: 4px 0 4px 16px; margin: 16px 0; color: var(--text-secondary); font-style: italic; }

/* ===== Module 3a · Notes List（主持人札记） ===== */
.notes-stack { max-width: 1100px; margin: 0 auto; padding: 0 48px; display: flex; flex-direction: column; gap: 16px; }
.note-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 24px 28px; display: grid; grid-template-columns: 56px 1fr; gap: 20px; align-items: baseline; }
.note-num { font-size: 1.6rem; font-weight: 600; color: var(--accent); font-variant-numeric: tabular-nums; line-height: 1; opacity: 0.6; }
.note-body h4 { font-size: 1.1rem; margin-bottom: 8px; color: var(--text-primary); }
.note-body p { font-size: 0.98rem; line-height: 1.85; color: var(--text-secondary); margin: 0 0 12px; }
.note-body p:last-child { margin-bottom: 0; }
.note-body p strong { color: var(--text-primary); }

/* ===== Module 3b · Q&A Card（主持人 Q&A） ===== */
.qa-stack { max-width: 1100px; margin: 0 auto; padding: 0 48px; display: flex; flex-direction: column; gap: 18px; }
.qa-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 28px 32px; }
.qa-tag { display: inline-flex; align-items: center; gap: 6px; font-size: 0.78rem; letter-spacing: 0.06em; padding: 4px 12px; border-radius: 999px; background: var(--bg-warm); color: var(--text-secondary); margin-bottom: 14px; font-weight: 500; }
.qa-tag.tag-key { background: #FEF3C7; color: #B45309; }
.qa-tag.tag-confuse { background: #FEE2E2; color: #B91C1C; }
.qa-tag.tag-miss { background: #DBEAFE; color: #1D4ED8; }
.qa-tag.tag-meta { background: #EDE9FE; color: #6D28D9; }
.qa-question { font-size: 1.15rem; font-weight: 600; color: var(--text-primary); margin-bottom: 14px; line-height: 1.5; }
.qa-question::before { content: "Q. "; color: var(--accent); font-weight: 700; }
.qa-answer { color: var(--text-secondary); font-size: 1rem; line-height: 1.85; }
.qa-answer::before { content: "A. "; color: var(--text-muted); font-weight: 600; margin-right: 4px; }
.qa-answer p { margin-bottom: 12px; }
.qa-answer p:last-child { margin-bottom: 0; }
.qa-answer strong { color: var(--text-primary); }

/* ===== Module 4 · Trigger Table（关键变量触发表） ===== */
.trigger-wrap { max-width: 1100px; margin: 0 auto; padding: 0 48px; }
.trigger-table { width: 100%; border-collapse: separate; border-spacing: 0; background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; font-variant-numeric: tabular-nums; }
.trigger-table th, .trigger-table td { padding: 18px 22px; text-align: left; border-bottom: 1px solid var(--border-light); vertical-align: top; }
.trigger-table tr:last-child td { border-bottom: none; }
.trigger-table th { background: var(--bg-elevated); color: var(--text-muted); font-size: 0.85rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; }
.trigger-var { font-weight: 600; color: var(--text-primary); font-size: 1.02rem; min-width: 200px; }
.trigger-var .now { display: block; font-weight: 400; color: var(--text-muted); font-size: 0.85rem; margin-top: 4px; letter-spacing: 0; text-transform: none; }
.trigger-action { color: var(--text-secondary); font-size: 0.98rem; line-height: 1.85; }
.trigger-action strong { color: var(--text-primary); font-weight: 600; }
.trigger-action .up { color: var(--red); font-weight: 600; }
.trigger-action .down { color: var(--green); font-weight: 600; }

/* ===== Sub-section divider（用于 Module 3 内部 3a / 3b 分隔） ===== */
.subsection-label { max-width: 1100px; margin: 48px auto 20px; padding: 0 48px; font-size: 0.85rem; color: var(--accent); letter-spacing: 0.18em; text-transform: uppercase; font-weight: 600; }
.subsection-label:first-of-type { margin-top: 0; }

/* ===== Passage Card（兜底承接：4 模块外的非标内容） ===== */
.passage-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 36px 40px; max-width: 1100px; margin: 0 auto 24px; }
.passage-card h3 { font-size: 1.3rem; margin-bottom: 16px; color: var(--text-primary); }
.passage-card h4 { font-size: 1.05rem; margin: 24px 0 10px; color: var(--text-primary); }
.passage-card p { font-size: 1rem; line-height: 1.9; margin-bottom: 16px; color: var(--text-secondary); }
.passage-card ul, .passage-card ol { padding-left: 22px; margin-bottom: 16px; }
.passage-card li { margin-bottom: 8px; line-height: 1.85; color: var(--text-secondary); }
.passage-card strong { color: var(--text-primary); font-weight: 600; }
.passage-card table { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; font-size: 0.95rem; margin: 16px 0 24px; }
.passage-card th, .passage-card td { padding: 12px 14px; text-align: left; border-bottom: 1px solid var(--border-light); vertical-align: top; }
.passage-card th { color: var(--text-muted); font-weight: 500; background: var(--bg-elevated); letter-spacing: 0.04em; font-size: 0.85rem; }

/* ===== Footer ===== */
footer { background: var(--bg-dark); color: var(--text-light); padding: 48px; text-align: center; margin-top: 72px; }
footer p { max-width: 680px; margin: 0 auto; font-size: 0.95rem; }
.footer-sub { margin-top: 16px; font-size: 0.8rem; color: var(--text-light); opacity: 0.7; }

/* ===== Responsive ===== */
@media (max-width: 900px) {
  .container, .voice-stack, .qa-stack, .trigger-wrap, .notes-stack, .subsection-label, .conclusion-wrap { padding-left: 24px; padding-right: 24px; }
  .hero { padding-left: 24px; padding-right: 24px; }
  .conclusion-card { padding: 28px 24px; }
  .cc-headline { font-size: 1.05rem; line-height: 1.7; }
  .cc-action-row { grid-template-columns: 1fr; gap: 6px; }
  .cc-snapshot-grid { grid-template-columns: repeat(2, 1fr); }
  .cc-snap-cell:nth-child(4n) { border-right: 1px solid var(--border-light); }
  .cc-snap-cell:nth-child(2n) { border-right: none; }
  .cc-snap-cell:nth-last-child(-n+4) { border-bottom: 1px solid var(--border-light); }
  .cc-snap-cell:nth-last-child(-n+2) { border-bottom: none; }
  .hero h1 { font-size: 2.2rem; }
  nav { padding: 0 24px; }
  .nav-links { display: none; }
  .voice-card, .passage-card { padding: 24px; }
  .qa-card { padding: 22px; }
  .trigger-table th, .trigger-table td { padding: 14px 14px; }
  .note-item { padding: 20px; grid-template-columns: 1fr; gap: 8px; }
  .section-head { padding: 0 24px; }
}
</style>
</head>
<body>

{{BODY}}

<footer>
  <p>⚠️ 以上内容由 AI 基于公开信息整理生成，仅供参考，不构成任何投资建议或个股推荐。投资有风险，决策需谨慎。</p>
  <p class="footer-sub">stock-partner-team · Generated {{DATE}}</p>
</footer>

</body>
</html>
